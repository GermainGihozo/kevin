apiVersion: 1

policies:
  - orgId: 1
    receiver: grafana-default
    group_by: ['grafana_folder', 'alertname']
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h
    routes:
      # Critical alerts → Slack immediately
      - receiver: slack-operations
        matchers:
          - severity = critical
        group_wait: 0s
        repeat_interval: 30m
      # Warning alerts → Slack with delay
      - receiver: slack-operations
        matchers:
          - severity = warning
        group_wait: 1m
        repeat_interval: 2h
