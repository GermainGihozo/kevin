global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'vaccine-tracker'

rule_files:
  - "/etc/prometheus/rules/*.yml"

# No alertmanager in this stack — alerts fire in Grafana directly
# alerting: (disabled — Grafana handles alerting via its own rules)

scrape_configs:

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Custom blockchain metrics exporter
  - job_name: 'blockchain-exporter'
    static_configs:
      - targets: ['blockchain-exporter:8080']
    scrape_interval: 15s
    metrics_path: /metrics
    scrape_timeout: 10s
